services:
  # ==================== PostgreSQL + pgvector ====================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ragadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_plz}
      POSTGRES_DB: ${POSTGRES_DB:-knowledge_rag}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragadmin -d knowledge_rag"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    restart: unless-stopped
    # ports:
    #   - "6379:6379"  # 被本机 Docker 占用，内部通信不需要暴露
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ==================== MinIO 对象存储 ====================
  minio:
    image: minio/minio:latest
    container_name: rag-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== RabbitMQ ====================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rag-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== FastAPI 后端 ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ragadmin}:${POSTGRES_PASSWORD:-change_me_plz}@postgres:5432/${POSTGRES_DB:-knowledge_rag}
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672//
      - MINIO_ENDPOINT=minio:9000
      - USE_MINIO=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - uploaddata:/app/data/uploads
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --log-level info

  # ==================== Celery Worker ====================
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-celery
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-ragadmin}:${POSTGRES_PASSWORD:-change_me_plz}@postgres:5432/${POSTGRES_DB:-knowledge_rag}
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672//
      - MINIO_ENDPOINT=minio:9000
      - USE_MINIO=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - uploaddata:/app/data/uploads
    command: celery -A backend.tasks.celery_app worker -l info --concurrency=2

  # ==================== Celery Beat（定时任务） ====================
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-celery-beat
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - celery_worker
    volumes:
      - uploaddata:/app/data/uploads
    command: celery -A backend.tasks.celery_app beat -l info

  # ==================== Nginx 反向代理 ====================
  nginx:
    image: nginx:alpine
    container_name: rag-nginx
    restart: unless-stopped
    ports:
      - "8080:80"        # 80/443 被 Steam++ 占用，改用 8080
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/usr/share/nginx/html:ro  # 生产环境前端构建产物
    depends_on:
      - backend
    command: >
      sh -c "nginx -g 'daemon off;'"

volumes:
  pgdata:
  redisdata:
  miniodata:
  rabbitmqdata:
  uploaddata:
