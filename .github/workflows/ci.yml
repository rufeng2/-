name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
  pull-requests: read
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements.txt -r backend/requirements-langchain.txt -r requirements-dev.txt pip-audit
      - run: python -m compileall backend
      - run: pytest tests -q
      - run: pip-audit
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
  compose:
    runs-on: ubuntu-latest
    env:
      COMPOSE_PROJECT_NAME: knowledge-rag
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose -f docker-compose.yml -f docker-compose.production.yml config
      - run: docker build -f backend/Dockerfile -t knowledge-rag-backend:ci .
