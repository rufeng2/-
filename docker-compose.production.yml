services:
  backend:
    image: ${BACKEND_IMAGE:-knowledge-rag-backend}:${APP_VERSION:-local}
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    read_only: true
    tmpfs: ["/tmp"]
    volumes:
      - uploaddata:/app/data/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/live', timeout=2)"]
      interval: 15s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits: {cpus: "2.0", memory: 2G}
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "5"}

  clamav:
    image: clamav/clamav:stable
    profiles: ["security"]
    restart: unless-stopped
    volumes: [clamavdata:/var/lib/clamav]
  prometheus:
    image: prom/prometheus:v2.53.1
    profiles: ["observability"]
    restart: unless-stopped
    ports: ["9090:9090"]
    volumes:
      - ./ops/prometheus:/etc/prometheus:ro
      - prometheusdata:/prometheus
  grafana:
    image: grafana/grafana:11.1.4
    profiles: ["observability"]
    restart: unless-stopped
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    secrets: [grafana_admin_password]
  opensearch:
    image: opensearchproject/opensearch:2.16.0
    profiles: ["search"]
    restart: unless-stopped
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ports: ["9200:9200"]
    volumes: [opensearchdata:/usr/share/opensearch/data]
secrets:
  grafana_admin_password:
    file: ./secrets/grafana_admin_password
volumes:
  uploaddata:
  clamavdata:
  prometheusdata:
  grafanadata:
  opensearchdata:
