groups:
  - name: knowledge-rag
    rules:
      - alert: RagBackendDown
        expr: up{job="knowledge-rag"} == 0
        for: 2m
        labels: {severity: critical}
        annotations: {summary: "Knowledge RAG backend is unavailable"}
      - alert: RagHighErrorRate
        expr: sum(rate(rag_http_requests_total{status=~"5.."}[5m])) / clamp_min(sum(rate(rag_http_requests_total[5m])), 0.001) > 0.05
        for: 5m
        labels: {severity: warning}
        annotations: {summary: "Backend 5xx rate exceeds 5%"}